<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>B2B GoX - Register to trade safely</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght=400;500;600;700;800&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        brandBlueStart: '#2575fc',
                        brandBlueEnd: '#1a56db',
                        brandRedButton: '#e53e3e',
                        formBorder: '#dcdfe6',
                        textDark: '#1e293b'
                    }
                }
            }
        }
    </script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc;
            min-height: 100vh;
        }
        /* Custom checkbox style adaptation if native doesn't suffice */
        input[type="checkbox"] {
            accent-color: #1e293b;
        }
        input[type="radio"] {
            accent-color: #3b82f6;
        }
    </style>
</head>
<body class="flex items-center justify-center p-0 md:p-4 lg:p-8">

    <!-- Wrapper matching the exact split design of login b2bgox2.jpg -->
    <div class="w-full max-w-[1300px] bg-white rounded-2xl shadow-2xl overflow-hidden flex flex-col lg:flex-row min-h-[750px]">
        
        <!-- LEFT PANEL: Dynamic Blue Global Logistics Graphics & Features -->
     
	 
	 <div
    class="w-full lg:w-1/2 p-8 md:p-12 flex flex-col justify-between text-white relative overflow-hidden"
    style="
        background: url('https://i.ibb.co/qGvcvZc/istockphoto-1567487790-612x612.jpg');
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;">
	 
            
            <!-- Graphic Illustration Section (Cargo plane, Ship, Globe container) -->
            <div class="relative w-full h-[320px] md:h-[380px] flex items-center justify-center mt-4">
                <!-- Main global trade sphere backdrop -->
               

                <!-- Commercial Cargo Airplane (Flying leftwards high over globe) -->
                <div class="absolute top-10 left-4 md:left-8 z-20 drop-shadow-xl animate-bounce" style="animation-duration: 4s;">
                    <i class="fa-solid fa-plane text-white text-6xl md:text-7xl transform -rotate-12"></i>
                </div>
            </div>

            <!-- Value Proposition Text Layout -->
   <div class="absolute top-8 right-8 text-right z-10">

    <h1 class="text-3xl md:text-4xl font-bold tracking-tight mb-4">
        Register for trusted business
    </h1>

    <ul class="space-y-2.5 text-base md:text-lg font-normal text-blue-50">
        <li class="flex items-center justify-end gap-2">
            2,400,000+ Reliable Suppliers
            <span class="text-xs text-blue-200">&#9679;</span>
        </li>

        <li class="flex items-center justify-end gap-2">
            Easy & Efficient Sourcing
            <span class="text-xs text-blue-200">&#9679;</span>
        </li>

        <li class="flex items-center justify-end gap-2">
            Secure Online Transactions
            <span class="text-xs text-blue-200">&#9679;</span>
        </li>
    </ul>

</div>
   
   
   
   
        </div>



        <!-- RIGHT PANEL: Formal Registration Submission Interface -->
        <div class="w-full lg:w-1/2 bg-white p-6 md:p-10 lg:p-12 flex flex-col justify-center">
            
            <!-- Header Group -->
            <div class="text-center mb-6">
                <h2 class="text-2xl md:text-3xl font-bold text-slate-800 tracking-tight">Welcome to B2BGoX.com</h2>
                <p class="text-xs md:text-sm text-gray-500 mt-1.5 font-medium">
                    Already Have an account? 
                    <a href="#" class="text-blue-600 font-semibold hover:underline inline-flex items-center gap-0.5">
                        Sign In <i class="fa-solid fa-circle-right text-[11px]"></i>
                    </a>
                </p>
            </div>

            <!-- Buyer/Supplier Custom Selection Radio Matrix -->
            <div class="flex items-center justify-center gap-8 mb-6 text-sm font-medium text-slate-700">
                <label class="flex items-center gap-2 cursor-pointer group">
                    <input type="radio" name="userAccountType" value="buyer" class="w-4 h-4 border-gray-300 focus:ring-blue-500 text-blue-600">
                    <span class="group-hover:text-blue-600 transition-colors">Buyer</span>
                </label>
                <label class="flex items-center gap-2 cursor-pointer group">
                    <input type="radio" name="userAccountType" value="supplier" checked class="w-4 h-4 border-gray-300 focus:ring-blue-500 text-blue-600">
                    <span class="group-hover:text-blue-600 transition-colors">Supplier</span>
                </label>
            </div>

            <!-- Structured registration form layout containing exactly 12 input panels -->
            <form class="space-y-3.5">
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-3.5">
                    <input type="text" placeholder="Full Name*" class="w-full px-3.5 py-2.5 text-sm border border-formBorder rounded focus:outline-none focus:border-blue-500 text-slate-800 placeholder-gray-400 shadow-2xs">
                    <input type="text" placeholder="Company Name" class="w-full px-3.5 py-2.5 text-sm border border-formBorder rounded focus:outline-none focus:border-blue-500 text-slate-800 placeholder-gray-400 shadow-2xs">
                </div>

                <div class="grid grid-cols-1 sm:grid-cols-2 gap-3.5">
                    <input type="text" placeholder="Selling Products*" class="w-full px-3.5 py-2.5 text-sm border border-formBorder rounded focus:outline-none focus:border-blue-500 text-slate-800 placeholder-gray-400 shadow-2xs">
                    <input type="text" placeholder="Phone / Mobile *" class="w-full px-3.5 py-2.5 text-sm border border-formBorder rounded focus:outline-none focus:border-blue-500 text-slate-800 placeholder-gray-400 shadow-2xs">
                </div>

                <div class="grid grid-cols-1 sm:grid-cols-2 gap-3.5">
                    <input type="email" placeholder="Email *" class="w-full px-3.5 py-2.5 text-sm border border-formBorder rounded focus:outline-none focus:border-blue-500 text-slate-800 placeholder-gray-400 shadow-2xs">
                    <input type="text" placeholder="Job Title" class="w-full px-3.5 py-2.5 text-sm border border-formBorder rounded focus:outline-none focus:border-blue-500 text-slate-800 placeholder-gray-400 shadow-2xs">
                </div>

                <div class="grid grid-cols-1 sm:grid-cols-2 gap-3.5">
                    <input type="url" placeholder="Company Website" class="w-full px-3.5 py-2.5 text-sm border border-formBorder rounded focus:outline-none focus:border-blue-500 text-slate-800 placeholder-gray-400 shadow-2xs">
                    <input type="text" placeholder="Area Code*" class="w-full px-3.5 py-2.5 text-sm border border-formBorder rounded focus:outline-none focus:border-blue-500 text-slate-800 placeholder-gray-400 shadow-2xs">
                </div>

                <div class="grid grid-cols-1 sm:grid-cols-2 gap-3.5">
                    <input type="text" placeholder="Full Name*" class="w-full px-3.5 py-2.5 text-sm border border-formBorder rounded focus:outline-none focus:border-blue-500 text-slate-800 placeholder-gray-400 shadow-2xs">
                    <input type="text" placeholder="Company Name" class="w-full px-3.5 py-2.5 text-sm border border-formBorder rounded focus:outline-none focus:border-blue-500 text-slate-800 placeholder-gray-400 shadow-2xs">
                </div>

                <div class="grid grid-cols-1 sm:grid-cols-2 gap-3.5">
                    <input type="password" placeholder="Create a Password *" class="w-full px-3.5 py-2.5 text-sm border border-formBorder rounded focus:outline-none focus:border-blue-500 text-slate-800 placeholder-gray-400 shadow-2xs">
                    <input type="password" placeholder="Confirm Password" class="w-full px-3.5 py-2.5 text-sm border border-formBorder rounded focus:outline-none focus:border-blue-500 text-slate-800 placeholder-gray-400 shadow-2xs">
                </div>

                <!-- Privacy & User Aggreements compliance module checkbox block -->
                <div class="flex items-start gap-2 pt-2">
                    <input type="checkbox" id="userAgreementsCheck" checked class="mt-0.5 w-4 h-4 rounded text-slate-800 focus:ring-slate-500 cursor-pointer">
                    <label Henrik for="userAgreementsCheck" class="text-xs text-slate-600 leading-tight select-none cursor-pointer">
                        I agree to the <a href="#" class="text-blue-500 font-medium hover:underline">User Agreement</a> and the <a href="#" class="text-blue-500 font-medium hover:underline">Privacy Policy</a>.
                    </label>
                </div>

                <!-- Explicit action trigger submission controller button -->
                <div class="pt-3">
                    <button type="submit" class="w-full bg-[#008000] hover:bg-red-700 text-white font-semibold py-3 rounded-full text-center text-sm md:text-base tracking-wide transition-all duration-200 shadow-md">
                        Verify Email
                    </button>
                </div>
            </form>

            <!-- Social Alternative Sign-In Option Line Breakdown -->
            <div class="relative flex py-5 items-center">
                <div class="flex-grow border-t border-gray-200"></div>
                <span class="flex-shrink mx-4 text-xs text-gray-400 font-medium tracking-wide bg-white px-1">Or sign in with</span>
                <div class="flex-grow border-t border-gray-200"></div>
            </div>

            <!-- Single Sign-On Oauth Group Wrapper with rounded vector elements -->
            <div class="flex items-center justify-center gap-5">
                					
				   <a href="#" class="flex items-center justify-center py-2.5 rounded bg-socialBg hover:bg-gray-200 transition-colors" title="Sign Up with Google">
                    <i class="fa-brands fa-google text-red-500 text-lg"></i>
                </a>
				
				
                <a href="#" class="w-10 h-10 rounded-full border border-gray-200 shadow-xs flex items-center justify-center bg-white hover:bg-gray-50 transition-colors text-blue-600" title="Facebook Integration API Sign In">
                    <i class="fa-brands fa-facebook-f text-lg"></i>
                </a>
                <a href="#" class="w-10 h-10 rounded-full border border-gray-200 shadow-xs flex items-center justify-center bg-white hover:bg-gray-50 transition-colors text-blue-700" title="LinkedIn Integration API Sign In">
                    <i class="fa-brands fa-linkedin-in text-lg"></i>
                </a>
                <a href="#" class="w-10 h-10 rounded-full border border-gray-200 shadow-xs flex items-center justify-center bg-white hover:bg-gray-50 transition-colors text-black font-black" title="X / Twitter Integration API Sign In">
                    <i class="fa-brands fa-x-twitter text-base"></i>
                </a>
				
				<a href="#" class="w-10 h-10 rounded-full border border-gray-200 shadow-xs flex items-center justify-center bg-white hover:bg-gray-50 transition-colors" title="Google Integration API Sign In">
                    <img src="https://cdnjs.cloudflare.com/ajax/libs/logos/1.0.0/google-icon.svg" alt="Google authentication" class="w-5 h-5">
                </a>
            </div>

        </div>
    </div>

</body>
</html>
